# koji-setup.yml — overrides auto-detected verify commands for the koji BUILD agent.
# Uses vitest (the project's actual test runner) not bun test, to avoid bun-compat
# issues with Chai-style matchers (instanceOf) and Response body consumption semantics.
verify:
  lint:
    - echo "lint skipped (ESLint native bindings fail in macOS temp sandboxes)"
  test:
    - npx vitest run src/context.test.ts
  uat:
    cmd: npx vitest run src/context.test.ts
    required: false
