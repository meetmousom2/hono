# koji-setup.yml — overrides auto-detected verify commands for the koji BUILD agent.
# Uses vitest (the project's actual test runner) via bunx so no separate install needed.
verify:
  lint:
    - echo "lint skipped (ESLint native bindings fail in macOS temp sandboxes)"
  test:
    - bunx vitest run src/context.test.ts
  uat:
    cmd: bunx vitest run src/context.test.ts
    required: false