# koji-setup.yml — overrides auto-detected verify commands for the koji BUILD agent.
# bun:test is the only viable runner in macOS temp sandboxes (vitest/rolldown native bindings fail).
verify:
  lint:
    - echo "lint skipped (ESLint native bindings fail in macOS temp sandboxes)"
  test:
    - bun test src/context.test.ts
  uat:
    cmd: bun test src/context.test.ts
    required: false
