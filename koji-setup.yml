# koji-setup.yml — overrides auto-detected verify commands for the koji BUILD agent.
# Lint is skipped because ESLint native bindings fail in macOS temp sandboxes.
# TypeScript errors will surface as test failures in bun test.
verify:
  lint:
    - echo "lint skipped (ESLint native bindings fail in macOS temp sandboxes)"
  test:
    - bun test src/trailing-slash.test.ts
